worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s;

    upstream hived {
        server pixagram:7777;
    }

    upstream hivemind {
        server hivemind:8080;
    }

    init_by_lua_block {
        -- hivemind handles these API namespaces
        hivemind_apis = {
            ["bridge"] = true,
            ["follow_api"] = true,
            ["tags_api"] = true,
        }

        -- specific condenser_api methods handled by hivemind
        hivemind_condenser_methods = {
            ["condenser_api.get_followers"] = true,
            ["condenser_api.get_following"] = true,
            ["condenser_api.get_follow_count"] = true,
            ["condenser_api.get_content"] = true,
            ["condenser_api.get_content_replies"] = true,
            ["condenser_api.get_discussions_by_trending"] = true,
            ["condenser_api.get_discussions_by_hot"] = true,
            ["condenser_api.get_discussions_by_created"] = true,
            ["condenser_api.get_discussions_by_promoted"] = true,
            ["condenser_api.get_discussions_by_blog"] = true,
            ["condenser_api.get_discussions_by_feed"] = true,
            ["condenser_api.get_discussions_by_comments"] = true,
            ["condenser_api.get_replies_by_last_update"] = true,
            ["condenser_api.get_blog"] = true,
            ["condenser_api.get_blog_entries"] = true,
            ["condenser_api.get_active_votes"] = true,
            ["condenser_api.get_reblogged_by"] = true,
            ["condenser_api.get_account_votes"] = true,
            ["condenser_api.get_trending_tags"] = true,
            ["condenser_api.get_discussions_by_author_before_date"] = true,
            ["condenser_api.get_post_discussions_by_payout"] = true,
            ["condenser_api.get_comment_discussions_by_payout"] = true,
            ["condenser_api.get_account_reputations"] = true,
        }

        -----------------------------------------------------------------
        -- Token / field-name translation tables
        -- Inbound:  app speaks PIXA/PXS  → chain speaks TESTS/TBD
        -- Outbound: chain speaks TESTS/TBD → app sees PIXA/PXS
        -----------------------------------------------------------------

        -- Request: field name renames (app → chain)
        -- Order: longest first to avoid partial matches
        req_field_renames = {
            { "reward_vesting_pixa",               "reward_vesting_hive" },
            { "reward_pixa_balance",               "reward_hive_balance" },
            { "reward_pxs_balance",                "reward_hbd_balance" },
            { "reward_pixa",                       "reward_hive" },
            { "reward_pxs",                        "reward_hbd" },
            { "savings_pxs_seconds_last_update",   "savings_hbd_seconds_last_update" },
            { "savings_pxs_last_interest_payment", "savings_hbd_last_interest_payment" },
            { "savings_pxs_seconds",               "savings_hbd_seconds" },
            { "savings_pxs_balance",               "savings_hbd_balance" },
            { "pxs_seconds_last_update",           "hbd_seconds_last_update" },
            { "pxs_last_interest_payment",         "hbd_last_interest_payment" },
            { "pxs_seconds",                       "hbd_seconds" },
            { "pxs_balance",                       "hbd_balance" },
            { "last_pxs_exchange_update",          "last_hbd_exchange_update" },
            { "pxs_exchange_rate",                 "hbd_exchange_rate" },
            { "pxs_interest_rate",                 "hbd_interest_rate" },
            { "pxs_amount",                        "hbd_amount" },
            { "pixa_amount",                       "hive_amount" },
            { "percent_pxs",                       "percent_hbd" },
        }

        -- Request: token symbol renames (app → chain)
        req_symbol_renames = {
            { "PIXA",  "TESTS" },
            { "PXS",   "TBD" },
        }

        -- Response: field name renames (chain → app)
        resp_field_renames = {
            { "reward_vesting_hive",               "reward_vesting_pixa" },
            { "reward_hive_balance",               "reward_pixa_balance" },
            { "reward_hbd_balance",                "reward_pxs_balance" },
            { "reward_hive",                       "reward_pixa" },
            { "reward_hbd",                        "reward_pxs" },
            { "savings_hbd_seconds_last_update",   "savings_pxs_seconds_last_update" },
            { "savings_hbd_last_interest_payment", "savings_pxs_last_interest_payment" },
            { "savings_hbd_seconds",               "savings_pxs_seconds" },
            { "savings_hbd_balance",               "savings_pxs_balance" },
            { "hbd_seconds_last_update",           "pxs_seconds_last_update" },
            { "hbd_last_interest_payment",         "pxs_last_interest_payment" },
            { "hbd_seconds",                       "pxs_seconds" },
            { "hbd_balance",                       "pxs_balance" },
            { "last_hbd_exchange_update",          "last_pxs_exchange_update" },
            { "hbd_exchange_rate",                 "pxs_exchange_rate" },
            { "hbd_interest_rate",                 "pxs_interest_rate" },
            { "pending_rewarded_vesting_hive",     "pending_rewarded_vesting_pixa" },
            { "total_vesting_fund_hive",           "total_vesting_fund_pixa" },
            { "total_reward_fund_hive",            "total_reward_fund_pixa" },
            { "current_hbd_supply",                "current_pxs_supply" },
            { "init_hbd_supply",                   "init_pxs_supply" },
            { "hbd_print_rate",                    "pxs_print_rate" },
            { "hbd_stop_percent",                  "pxs_stop_percent" },
            { "hbd_start_percent",                 "pxs_start_percent" },
            { "hbd_amount",                        "pxs_amount" },
            { "hive_amount",                       "pixa_amount" },
            { "percent_hbd",                       "percent_pxs" },
            { "dhf_interval_ledger",               "dpf_interval_ledger" },
        }

        -- Response: token symbol renames (chain → app)
        resp_symbol_renames = {
            { "TESTS", "PIXA" },
            { "TBD",   "PXS" },
            { "HBD",   "PXS" },
        }

        -- Helper: apply a list of {from, to} replacements
        function apply_renames(body, renames)
            for _, pair in ipairs(renames) do
                body = body:gsub(pair[1], pair[2])
            end
            return body
        end
    }

    server {
        listen 8080;

        location / {
            set $backend "hived";

            access_by_lua_block {
                ngx.req.read_body()
                local body = ngx.req.get_body_data()
                if not body then
                    return
                end

                -- extract method from JSON-RPC request
                local method = body:match('"method"%s*:%s*"([^"]+)"')
                if not method then
                    return
                end

                -- check full method name first (e.g. condenser_api.get_content)
                if hivemind_condenser_methods[method] then
                    ngx.var.backend = "hivemind"
                end

                -- check API namespace (e.g. bridge, follow_api)
                local namespace = method:match("^([^%.]+)")
                if namespace and hivemind_apis[namespace] then
                    ngx.var.backend = "hivemind"
                end

                -- Translate inbound: PIXA/PXS field names & symbols → TESTS/TBD
                body = apply_renames(body, req_field_renames)
                body = apply_renames(body, req_symbol_renames)
                ngx.req.set_body_data(body)
            }

            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Content-Type "application/json";
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;

            # CORS headers
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            # Translate outbound: TESTS/TBD field names & symbols → PIXA/PXS
            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                if chunk and #chunk > 0 then
                    chunk = apply_renames(chunk, resp_field_renames)
                    chunk = apply_renames(chunk, resp_symbol_renames)
                    ngx.arg[1] = chunk
                end
            }

            # Disable response buffering length check (rewritten body changes size)
            header_filter_by_lua_block {
                ngx.header.content_length = nil
            }
        }

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
